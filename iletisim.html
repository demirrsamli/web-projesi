    <header class="bg-dark text-white py-5 text-center">
        <div class="container">
            <h1><span class="accent">İletişim</span></h1>
            <p class="mb-0">Mesajını gönder, en kısa sürede dönüş yapılacaktır.</p>
        </div>
    </header>

    <main class="container my-5">
        <div id="iletisimApp">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <form id="iletisimForm" action="iletisim_islemi.php" method="POST" novalidate>
                        <div class="mb-3">
                            <label for="adsoyad" class="form-label">Ad Soyad</label>
                            <input type="text" id="adsoyad" name="adsoyad" class="form-control" v-model="adsoyad">
                            <div id="adsoyad-hata" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-posta</label>
                            <input type="email" id="email" name="email" class="form-control" v-model="email">
                            <div id="email-hata" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="telefon" class="form-label">Telefon</label>
                            <input type="tel" id="telefon" name="telefon" class="form-control" v-model="telefon" placeholder="5XXXXXXXXX">
                            <div id="telefon-hata" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="konu" class="form-label">Konu</label>
                            <select id="konu" name="konu" class="form-select" v-model="konu">
                                <option value="">seçin...</option>
                                <option value="staj">Staj Görüşmesi</option>
                                <option value="proje">Proje Değerlendirmesi</option>
                                <option value="genel">Genel Soru</option>
                                <option value="diger">Diğer</option>
                            </select>
                            <div id="konu-hata" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <fieldset>
                                <legend class="form-label fs-6">İletişim Tercihi</legend>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="tercih" value="email" id="tercihEmail" v-model="tercih">
                                    <label class="form-check-label" for="tercihEmail">E-posta ile ulaşın</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="tercih" value="telefon" id="tercihTelefon" v-model="tercih">
                                    <label class="form-check-label" for="tercihTelefon">Telefon ile ulaşın</label>
                                </div>
                            </fieldset>
                            <div id="tercih-hata" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="mesaj" class="form-label">Mesajınız</label>
                            <textarea id="mesaj" name="mesaj" class="form-control" rows="4" v-model="mesaj"></textarea>
                            <div id="mesaj-hata" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="kvkk" name="kvkk" v-model="kvkk">
                                <label class="form-check-label" for="kvkk">Kişisel verilerimin işlenmesine onay veriyorum (KVKK)</label>
                            </div>
                            <div id="kvkk-hata" class="text-danger small mt-1"></div>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="button" id="vanillaBtn" class="btn btn-primary">
                                <i class="bi bi-code-slash me-2"></i>Gönder (Vanilla JS)
                            </button>
                            <button type="button" id="vueBtn" class="btn btn-success" @click="vueGonder">
                                <i class="bi bi-box-seam me-2"></i>Gönder (Vue.js)
                            </button>
                        </div>

                        <div id="genelBildirim" class="mt-3 d-none"></div>
                    </form>
                </div>
            </div>
        </div>
    </main>
